<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wishlist | Great Parfum</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
  </style>
</head>
<body class="antialiased min-h-screen flex flex-col bg-[#F5F5F5] text-gray-900">

  <!-- Navbar -->
  <nav class="sticky top-0 z-50 w-full border-b bg-white/80 backdrop-blur-md">
    <div class="container mx-auto px-4 h-16 flex items-center justify-between">
      <div class="flex items-center gap-6 md:gap-10">
        <a href="index.html" class="flex items-center space-x-2">
          <span class="font-bold text-2xl tracking-tight text-[#0F0040]">Great Parfum</span>
        </a>
        <div class="hidden md:flex gap-6">
          <a href="index.html" class="text-sm font-medium text-gray-500 transition-colors hover:text-[#36E814]">Home</a>
          <a href="catalog.html" class="text-sm font-medium text-gray-500 transition-colors hover:text-[#36E814]">Perfumes</a>
          <a href="builder.html" class="text-sm font-medium text-gray-500 transition-colors hover:text-[#36E814]">Custom Blend</a>
          <a href="contact.html" class="text-sm font-medium text-gray-500 transition-colors hover:text-[#36E814]">Contact Us</a>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <a href="search.html" class="p-2 hover:bg-gray-100 rounded-full transition text-[#0F0040]">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </a>
        <a href="favorites.html" class="p-2 bg-gray-100 rounded-full transition text-[#36E814]">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        </a>
        <a href="login.html" class="p-2 hover:bg-gray-100 rounded-full transition text-[#0F0040]">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
        <a href="cart.html" class="p-2 hover:bg-gray-100 rounded-full transition relative text-[#0F0040]">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
          <span class="absolute top-0 right-0 h-2 w-2 rounded-full bg-[#36E814]"></span>
        </a>
      </div>
    </div>
  </nav>

  <main class="flex-1 container mx-auto px-4 py-12 max-w-5xl">
    <h1 class="text-3xl font-bold text-[#0F0040] mb-8">My Wishlist</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      
      <!-- Mockup Item -->
      <div class="bg-white rounded-2xl overflow-hidden hover:shadow-xl transition-all duration-300 border border-gray-100 flex flex-col h-full relative">
        <button class="absolute top-4 right-4 z-10 p-2 bg-white rounded-full shadow-md text-red-500 hover:text-gray-400">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        </button>
        <div class="aspect-square bg-[#F5F5F5] relative overflow-hidden flex items-center justify-center p-8">
          <img src="./images/custom-blend.png" alt="Velvet Wood" class="object-contain w-full h-full">
        </div>
        <div class="p-6 flex flex-col flex-1">
          <div class="flex justify-between items-start mb-2">
            <div class="text-xs font-semibold text-[#36E814] uppercase tracking-wider">Men • Extrait</div>
          </div>
          <h3 class="text-2xl font-bold text-[#0F0040] mb-2">Velvet Wood</h3>
          <p class="text-gray-500 text-sm mb-4 line-clamp-2">Deep, rich, and intensely masculine with smoky and leathery undertones.</p>
          
          <div class="mt-auto pt-4 border-t border-gray-100 flex items-center justify-between">
            <span class="font-bold text-xl">Rp 85.000</span>
            <a href="cart.html" class="px-4 py-2 border-2 border-[#0F0040] text-[#0F0040] text-sm font-medium rounded-md hover:bg-[#0F0040] hover:text-white transition">
              Add to Cart
            </a>
          </div>
        </div>
      </div>

    </div>
  </main>
</body>
</html>
